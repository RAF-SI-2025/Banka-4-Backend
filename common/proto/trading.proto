syntax = "proto3";

package trading.v1;

option go_package = "common/pkg/pb;pb";

service TradingService {
  rpc TransferFunds(TransferFundsRequest) returns (TransferFundsResponse);
  rpc ListPublicStocks(ListPublicStocksRequest) returns (ListPublicStocksResponse);
  rpc ReservePeerOtcShares(ReservePeerOtcSharesRequest) returns (PeerOtcSharesResponse);
  rpc ReleasePeerOtcShares(ReleasePeerOtcSharesRequest) returns (PeerOtcSharesResponse);
  rpc ConsumePeerOtcShares(ConsumePeerOtcSharesRequest) returns (PeerOtcSharesResponse);
  rpc CreditPeerOtcShares(CreditPeerOtcSharesRequest) returns (PeerOtcSharesResponse);
}

message TransferFundsRequest {
  uint64 from_manager_id = 1;
  uint64 to_manager_id   = 2;
}

message TransferFundsResponse {
  uint64 funds_transferred = 1;
}

// ListPublicStocks returns every stock holding at this bank with a
// non-zero public_amount, grouped by ticker. Consumed by interbank-service
// to serve §3.1 GET /interbank/public-stock to peer banks.
message ListPublicStocksRequest {}

message PublicStockSeller {
  uint64 seller_id = 1;
  double amount    = 2;
}

message PublicStockEntry {
  string ticker                       = 1;
  repeated PublicStockSeller sellers  = 2;
}

message ListPublicStocksResponse {
  repeated PublicStockEntry stocks = 1;
}

message ReservePeerOtcSharesRequest {
  string contract_id = 1;
  uint64 seller_id = 2;
  string ticker = 3;
  double amount = 4;
}

message ReleasePeerOtcSharesRequest {
  string contract_id = 1;
}

message ConsumePeerOtcSharesRequest {
  string contract_id = 1;
}

message CreditPeerOtcSharesRequest {
  string contract_id = 1;
  uint64 buyer_id = 2;
  string ticker = 3;
  double amount = 4;
  double price_per_unit_rsd = 5;
}

message PeerOtcSharesResponse {
  string contract_id = 1;
  string status = 2;
}
